---
pattern_id: semantic-password-analysis
pattern_name: "Password Semantic Analysis"
version: 1
created: "2026-04-21"
last_updated: "2026-04-21"
validated_scans: 2
hit_count: 5

trigger_rules:
  - generic-api-key
  - password

decision_tree:
  - step: 1
    name: "check_value_pattern"
    description: "检查密码值是否为明显的占位符"
    placeholder_signals:
      - pattern: "^password$|^admin$|^123456$|^qwerty$"
        judgment: "FALSE_POSITIVE"
        confidence: "high"
        reason: "极常见的占位密码，几乎从不是真实生产密码"
      
      - pattern: "^test_.*|^example_.*|^mock_.*"
        judgment: "FALSE_POSITIVE"
        confidence: "high"
        reason: "test/example/mock 前缀表明是测试数据"

  - step: 2
    name: "check_variable_name"
    description: "检查变量名称是否表明是测试/示例数据"
    test_indicators:
      - "test_password"
      - "mock_password"
      - "example_pwd"
      - "dummy_password"
      - "fake_pass"
    judgment_if_match: "FALSE_POSITIVE"
    confidence: "high"
    reason: "变量名含有 test/mock/example 等前缀"

  - step: 3
    name: "check_file_context"
    description: "根据文件路径和类型判断"
    contexts:
      - type: "test_file"
        patterns:
          - ".*_test\\.*"
          - ".*tests/.*"
          - ".*test_.*"
        judgment: "FALSE_POSITIVE"
        confidence: "high"
        reason: "测试文件中的密码通常是测试数据"
        exception: "测试文件中也可能包含真实密码，需要检查是否为标准格式密钥"

      - type: "documentation"
        patterns:
          - ".*\\.md$"
          - ".*docs/.*"
          - ".*README.*"
          - ".*example.*"
        judgment: "FALSE_POSITIVE"
        confidence: "high"
        reason: "文档中的密码是示例"

      - type: "configuration"
        patterns:
          - ".*config.*"
          - ".*settings.*"
          - ".*\\.properties$"
          - ".*\\.yml$"
          - ".*\\.yaml$"
        judgment: "NEEDS_REVIEW"
        confidence: "medium"
        reason: "配置文件中的密码可能是真实的，也可能是默认值/示例"
        additional_checks:
          - "是否有注释说明是示例"
          - "是否是 docker-compose 等开发环境配置"
          - "密码强度是否过低（可能是默认值）"

      - type: "production_source"
        patterns:
          - ".*src/main/.*"
          - ".*app/.*"
          - ".*lib/.*"
        judgment: "CONFIRMED"
        confidence: "high"
        reason: "生产代码中硬编码的密码是严重泄露"

  - step: 4
    name: "check_surrounding_comments"
    description: "检查上下文中的注释"
    fp_indicators:
      - "example"
      - "test"
      - "dummy"
      - "placeholder"
      - "TODO"
      - "FIXME"
      - "default"
    judgment_if_match: "FALSE_POSITIVE"
    confidence: "medium"
    reason: "注释表明这是示例或未完成的代码"

  - step: 5
    name: "check_password_strength"
    description: "检查密码强度作为辅助判断"
    weak_passwords:
      - "123456"
      - "password"
      - "admin"
      - "qwerty"
      - "letmein"
      - "welcome"
    note: "弱密码本身不能说明是误报，但如果出现在测试/文档中，误报概率更高"
    tool_command: "python3 scripts/decode_utils.py entropy '{password_value}'"
    entropy_threshold:
      low: "< 2.0 bits - 极低熵，强烈假设为示例/占位符"
      medium: "2.0-3.5 bits - 中等熵，结合上下文判断"
      high: "> 3.5 bits - 高熵，可能是真实密码"

decode_tools:
  entropy_check: "python3 scripts/decode_utils.py entropy '{string}'"
  full_analysis: "python3 scripts/decode_utils.py analyze '{string}'"

# 死规则提炼
  allowlist_regexes:
    - "test_[a-zA-Z0-9_]*password\\s*=\\s*['\"][^'\"]+['\"]"
    - "mock_[a-zA-Z0-9_]*password\\s*=\\s*['\"][^'\"]+['\"]"
    - "['\"]?password['\"]?\\s*[=:]\\s*['\"]?(password|admin|123456)['\"]?"

hit_stats:
  total_hits: 5
  confirmed_as_fp: 4
  confirmed_as_real: 1
  last_hit_scan: "batch-20260421"
