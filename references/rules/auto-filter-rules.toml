[[rules]]
id = "auto-filter-craft-fixture-tokens-20260428"
description = "Filter session fixture tokens in Craft CMS test data file (6 matches in craftcms scan)"
status = "experimental"
created = "2026-04-28"
validation_count = 0
source_scans = ["20260428-054959"]
[rules.allowlist]
