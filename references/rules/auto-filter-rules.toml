[[rules]]
id = "auto-filter-craft-fixture-tokens-20260428"
description = "Filter session fixture tokens in Craft CMS test data file (6 matches in craftcms scan)"
status = "experimental"
created = "2026-04-28"
validation_count = 0
source_scans = ["20260428-054959"]
[rules.allowlist]
paths = [
  '''tests/fixtures/data/sessions\.php''',
]

[[rules]]
id = "auto-filter-test-cookie-validation-key-20260428"
description = "Filter fake cookieValidationKey values in PHP unit test setup (1 match in craftcms scan)"
status = "experimental"
created = "2026-04-28"
validation_count = 0
source_scans = ["20260428-054959"]
[rules.allowlist]
paths = [
  '''tests/unit/web/RequestTest\.php''',
]
regexes = [
  '''cookieValidationKey' => 'lashdao8u09ud09u09231uoij098wqe''',
]

[[rules]]
id = "auto-filter-env-example-security-key-20260428"
description = "Filter example SECURITY_KEY and CRAFT_SECURITY_KEY values in .env.example files (3 matches in craftcms scan)"
status = "experimental"
created = "2026-04-28"
validation_count = 0
source_scans = ["20260428-054959"]
[rules.allowlist]
paths = [
  '''.*\.env\.example.*''',
]
regexes = [
  '''SECURITY_KEY=UPzGqJJMCTM4n07jkqaFNaVoof6j_Xfo''',
  '''CRAFT_SECURITY_KEY=qwerty1234567890''',
]

[[rules]]
